# =============================================================================
# Octoqus — Nginx Reverse Proxy Configuration
# HTTP → HTTPS redirect + SSL termination + API & WebSocket proxy
# =============================================================================

# Upstream tanımları
upstream backend_api {
    server octoqus_backend:8000;
}

upstream frontend_app {
    server octoqus_frontend:80;
}

# HTTP → HTTPS Redirect
server {
    listen 80;
    server_name octoqus.com www.octoqus.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Diğer tüm istekleri HTTPS'e yönlendir
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name octoqus.com www.octoqus.com;

    # SSL Sertifika (Let's Encrypt / Certbot)
    ssl_certificate /etc/letsencrypt/live/octoqus.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/octoqus.com/privkey.pem;

    # SSL güvenlik ayarları
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS (Strict Transport Security)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    client_max_body_size 10M;

    # ── API istekleri → Backend (Sanic) ──
    location /api/ {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket desteği (Chat için)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;  # 24 saat (WebSocket bağlantıları için)
    }

    # ── Upload dosyaları → Backend static serve ──
    location /uploads/ {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Static file cache
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Health check endpoint ──
    location /health {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
    }

    # ── Frontend (React SPA) → Tüm diğer istekler ──
    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
